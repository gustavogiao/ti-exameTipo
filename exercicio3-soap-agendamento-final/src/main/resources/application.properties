spring.application.name=exercicio3-soap-agendamento-final
server.port=8000

spring.datasource.url=jdbc:h2:mem:vetsaude_agendamento_final
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

vetsaude.services.tutors.wsdl=http://localhost:8002/services/tutors.wsdl
vetsaude.services.consultas.rest=http://localhost:8001/api/consultas
